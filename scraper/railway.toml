# This config is for the scraper service only.
# The Next.js API (pickleball-hub-mobile) is configured via Railway dashboard.
# Do not add Next.js config here.

[build]
builder = "dockerfile"
# Image CMD is scraper/Dockerfile: `python entrypoint.py` (not ingest.py directly).
# entrypoint.py runs scan_clubs + ingest on a schedule / trigger.
dockerfilePath = "scraper/Dockerfile"

[deploy]
# Scraper full ingest: 6am, 12pm, 3pm, 9pm VN → UTC 23:00, 05:00, 08:00, 14:00 (minute :00)
# Push notifications (PN6+PN7): every 30 min 7am–9pm VN → UTC 0–14 and 23 at :00/:30
#   :00 slots that match full-scrape hours run ingest; :30 slots (and other :00) run notify-only.
cronSchedule = "0,30 0-14,23 * * *"
# Token refresh: 1st of every month at 8:00 AM VN (01:00 UTC)
# Handled by entrypoint.py when day==1 and hour==8 VN.
